<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FlowChat</title>
</head>
<body>

  <h1>FlowChat</h1>

  <input
    type="text"
    id="messageInput"
    placeholder="Enter message"
  >

  <button id="sendButton">
    Send
  </button>

  <div id="messages"></div>

  <hr>

  <h3>Online users</h3>
  <div id="onlineUsers"></div>

  <h3>Room stats</h3>
  <div id="roomStats"></div>

  <script>
    const socket = new WebSocket('ws://localhost:8080');

    const username = prompt('Enter your username');
    const room = prompt('Enter room name');

    const input = document.getElementById('messageInput');
    const button = document.getElementById('sendButton');
    const messages = document.getElementById('messages');

    const onlineUsers =
      document.getElementById('onlineUsers');

    const roomStats =
      document.getElementById('roomStats');


    socket.addEventListener('open', () => {
      socket.send(JSON.stringify({
        type: 'join',
        username,
        room
      }));
    });

    socket.addEventListener('message', (event) => {
      const data = JSON.parse(event.data);

      if (data.type === 'roomData') {
        onlineUsers.innerHTML = '';
        roomStats.innerHTML = '';

        const usersTitle =
          document.createElement('p');

        usersTitle.textContent =
          `Online: ${data.online}`;

        onlineUsers.appendChild(usersTitle);

        for (const username of data.users) {
          const userElement =
            document.createElement('p');

          userElement.textContent = username;

          onlineUsers.appendChild(userElement);
        }

        for (const stat of data.stats) {
          const statElement =
            document.createElement('p');

          statElement.textContent =
            `${stat.room}: ${stat.online}`;

          roomStats.appendChild(statElement);
        }

        return;
      }

      const messageElement = document.createElement('p');

      if (data.type === 'system') {
        messageElement.textContent = `[SYSTEM]: ${data.text}`;
      }

      if (data.type === 'message') {
        messageElement.textContent =
          `#${data.id} ${data.username}: ${data.text}`;
      }

      messages.appendChild(messageElement);
    });

    button.addEventListener('click', () => {
      const text = input.value;

      socket.send(JSON.stringify({
        type: 'message',
        username,
        room,
        text
      }));

      input.value = '';
    });
  </script>

</body>
</html>
