<!DOCTYPE html>
<html lang="en">
<head>
  <style>

body {
    font-family: Arial;
    margin: 20px;
}

#messages {
    border: 1px solid gray;
    height: 300px;
    overflow-y: scroll;
    padding: 10px;
    margin-bottom: 10px;
}

#messages div {
    margin-bottom: 10px;
    padding: 5px;
    border-bottom: 1px solid #ddd;
}

input {
    padding: 8px;
}

button {
    padding: 8px;
    cursor: pointer;
}

</style>
  <meta charset="UTF-8">
  <title>FlowChat</title>
</head>
<body>

  <h1>FlowChat</h1>

  <input
    type="text"
    id="messageInput"
    placeholder="Enter message"
  >

  <button id="sendButton">
    Send
  </button>

  <div id="messages"></div>

  <hr>

  <h3>Online users</h3>
  <div id="onlineUsers"></div>

  <h3>Room stats</h3>
  <div id="roomStats"></div>

  <script>
    const socket = new WebSocket('ws://localhost:8080');

    const onlineCount = document.getElementById('onlineCount');
    const usersList = document.getElementById('usersList');
    const statsBox = document.getElementById('statsBox'); 

    socket.addEventListener('close', () => {

      addMessage({
        type: 'system',
        text: 'Disconnected from server',
        time: 'SYSTEM'
      });
    });
    socket.addEventListener('open', () => {

      addMessage({
        type: 'system',
        text: 'Connected to server',
        time: 'SYSTEM'
      });
    });

    const username = prompt('Enter your username');
    const room = prompt('Enter room name');

    const input = document.getElementById('messageInput');
    const button = document.getElementById('sendButton');
    const messages = document.getElementById('messages');

    const onlineUsers =
      document.getElementById('onlineUsers');

    const roomStats =
      document.getElementById('roomStats');


    socket.addEventListener('open', () => {
      socket.send(JSON.stringify({
        type: 'join',
        username,
        room
      }));
    });

    socket.addEventListener('message', (event) => {
      const data = JSON.parse(event.data);

      if (data.type === 'roomData') {
        onlineCount.textContent = data.online;

        usersList.innerHTML = '';

        data.users.forEach(user => {
          const li = document.createElement('li');
          li.textContent = user;
          usersList.appendChild(li);
        });

        statsBox.textContent =
          `Users joined: ${data.stats.joins}
      Messages: ${data.stats.messages}
      Blocked: ${data.stats.blocked}`;
      }

      if (data.type === 'roomData') {
        onlineUsers.innerHTML = '';
        roomStats.innerHTML = '';

        const usersTitle =
          document.createElement('p');

        usersTitle.textContent =
          `Online: ${data.online}`;

        onlineUsers.appendChild(usersTitle);

        for (const username of data.users) {
          const userElement =
            document.createElement('p');

          userElement.textContent = username;

          onlineUsers.appendChild(userElement);
        }

        for (const stat of data.stats) {
          const statElement =
            document.createElement('p');

          statElement.textContent =
            `${stat.room}: ${stat.online}`;

          roomStats.appendChild(statElement);
        }

        return;
      }

      addMessage(data);
    });

    function addMessage(message) {
      const messageElement =
        document.createElement('p');

      if (message.type === 'system') {
        messageElement.textContent =
          `[SYSTEM]: ${message.text}`;
      }

      if (message.type === 'message') {
        messageElement.textContent =
          `#${message.id} ${message.username}: ${message.text}`;
      }

      messages.appendChild(messageElement);
    }

    button.addEventListener('click', () => {
      const text = input.value;

      socket.send(JSON.stringify({
        type: 'message',
        username,
        room,
        text
      }));

      input.value = '';
    });
  </script>

</body>
</html>

<div class="sidebar">
    <h3>Online users</h3>
    <p id="onlineCount">0</p>

    <ul id="usersList"></ul>

    <h3>Stats</h3>
    <pre id="statsBox"></pre>
</div>
